<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АК-74М: Интерактивный тренажёр</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #0a0c14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app {
            max-width: 1400px;
            width: 100%;
            background: linear-gradient(145deg, #1a1e2b 0%, #0f121c 100%);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 215, 0, 0.15);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 0 12px;
        }

        .title {
            color: #ffd700;
            font-size: 2.2em;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
            letter-spacing: 1px;
        }

        .badge {
            background: linear-gradient(135deg, #ffd700, #daa520);
            color: #0a0c14;
            padding: 8px 20px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 1.1em;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .main-panel {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 24px;
            margin-bottom: 20px;
        }

        /* 3D вьювер */
        .viewer {
            background: #05070a;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            height: 550px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }

        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .viewer-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            padding: 10px 18px;
            border-radius: 50px;
            color: rgba(255,255,255,0.9);
            font-size: 0.9em;
            border: 1px solid rgba(255,215,0,0.3);
            pointer-events: none;
            z-index: 10;
        }

        /* Панель информации */
        .info-panel {
            background: rgba(10, 14, 23, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            color: white;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .mode-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 8px;
        }

        .mode-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #ffd700, #daa520);
            color: #0a0c14;
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        .current-part-card {
            background: linear-gradient(145deg, #1e2335, #151a28);
            border-radius: 20px;
            padding: 20px;
            border-left: 4px solid #ffd700;
        }

        .part-name {
            font-size: 1.6em;
            font-weight: 700;
            color: #ffd700;
            margin-bottom: 8px;
        }

        .part-desc {
            color: rgba(255,255,255,0.8);
            font-size: 0.95em;
            line-height: 1.5;
        }

        .progress-area {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 16px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: rgba(255,255,255,0.7);
        }

        .progress-bar {
            height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 100px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #daa520);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 100px;
            box-shadow: 0 0 15px #ffd700;
        }

        .parts-list {
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 8px;
            max-height: 280px;
            overflow-y: auto;
        }

        .part-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: rgba(255,255,255,0.02);
            border-radius: 14px;
            margin-bottom: 6px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .part-item:hover {
            background: rgba(255, 215, 0, 0.1);
            border-color: rgba(255, 215, 0, 0.3);
            transform: translateX(5px);
        }

        .part-item.completed {
            background: rgba(255, 215, 0, 0.15);
            border-color: #ffd700;
        }

        .part-item.active {
            background: rgba(255, 215, 0, 0.25);
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .part-number {
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #ffd700;
        }

        .part-item.completed .part-number {
            background: #ffd700;
            color: #0a0c14;
        }

        .part-title {
            flex: 1;
            font-weight: 500;
        }

        .part-status {
            font-size: 1.2em;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 8px;
        }

        button {
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ffd700, #daa520);
            color: #0a0c14;
            box-shadow: 0 10px 20px -10px #ffd700;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -10px #ffd700;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(255,255,255,0.15);
            border-color: #ffd700;
        }

        .btn-success {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-bar {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            border: 1px solid rgba(255,215,0,0.2);
            margin-top: 20px;
        }

        .status-message {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.1em;
        }

        .timer {
            font-family: 'Courier New', monospace;
            font-size: 1.8em;
            font-weight: 700;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .result-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, #1e2335, #151a28);
            padding: 40px;
            border-radius: 32px;
            border: 2px solid #ffd700;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3);
            z-index: 1000;
            text-align: center;
            min-width: 400px;
            display: none;
        }

        .result-modal.show {
            display: block;
            animation: modalAppear 0.3s ease;
        }

        @keyframes modalAppear {
            from {
                opacity: 0;
                transform: translate(-50%, -60%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        .result-title {
            font-size: 2em;
            color: #ffd700;
            margin-bottom: 20px;
        }

        .result-stats {
            font-size: 1.3em;
            color: white;
            margin-bottom: 30px;
        }

        .result-stats span {
            color: #ffd700;
            font-weight: 700;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 999;
            display: none;
        }

        .overlay.show {
            display: block;
        }

        .hint-text {
            color: #ffd700;
            font-style: italic;
            margin-top: 12px;
            padding: 12px;
            background: rgba(255,215,0,0.1);
            border-radius: 12px;
            border-left: 3px solid #ffd700;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="title">🔫 АК-74М: Тренажёр сборки-разборки</div>
            <div class="badge">v2.0 · Полная интерактивность</div>
        </div>

        <div class="main-panel">
            <!-- 3D Viewer -->
            <div class="viewer">
                <canvas id="canvas"></canvas>
                <div class="viewer-hint">
                    🖱️ ЛКМ: вращать · ПКМ: масштаб · Колесо: зум
                </div>
            </div>

            <!-- Info Panel -->
            <div class="info-panel">
                <div class="mode-selector">
                    <button class="mode-btn active" id="modeLearn">📖 Обучение</button>
                    <button class="mode-btn" id="modeTest">✍️ Тест</button>
                </div>

                <div class="current-part-card" id="currentPartCard">
                    <div class="part-name" id="currentPartName">Ствольная коробка</div>
                    <div class="part-desc" id="currentPartDesc">Основа автомата. Отделите магазин, проверьте отсутствие патрона.</div>
                </div>

                <div class="progress-area">
                    <div class="progress-header">
                        <span>Прогресс разборки</span>
                        <span id="progressPercent">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
                    </div>
                </div>

                <div class="parts-list" id="partsList"></div>

                <div class="action-buttons">
                    <button class="btn-primary" id="nextBtn" disabled>⏭️ Следующий шаг</button>
                    <button class="btn-secondary" id="checkBtn" disabled>✅ Проверить</button>
                    <button class="btn-secondary" id="resetBtn">🔄 Сбросить</button>
                    <button class="btn-success" id="completeBtn" disabled>🏁 Завершить</button>
                </div>

                <div id="hintBox" class="hint-text"></div>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-message">
                <span id="statusIcon">📖</span>
                <span id="statusMessage">Режим обучения. Нажимай "Следующий шаг"</span>
            </div>
            <div class="timer" id="timer">00:00</div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="result-modal" id="resultModal">
        <div class="result-title" id="resultTitle"></div>
        <div class="result-stats" id="resultStats"></div>
        <button class="btn-primary" id="closeResultBtn" style="width: 100%;">Продолжить</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // Данные об автомате (правильная последовательность)
        const akParts = [
            {
                id: 1,
                name: "Магазин",
                description: "Отсоединить магазин, проверить отсутствие патрона в патроннике. Нажать защёлку магазина.",
                color: 0x4a4a4a,
                position: { x: -0.2, y: 0.5, z: 0 }
            },
            {
                id: 2,
                name: "Крышка ствольной коробки",
                description: "Нажать на замыкатель крышки (сзади слева) и снять крышку движением вверх-вперёд.",
                color: 0x6b6b6b,
                position: { x: -0.2, y: 1.3, z: 0 }
            },
            {
                id: 3,
                name: "Возвратный механизм",
                description: "Утопить направляющий стержень, приподнять и извлечь возвратный механизм из канала затворной рамы.",
                color: 0x3a3a3a,
                position: { x: 0.2, y: 1.2, z: 0.2 }
            },
            {
                id: 4,
                name: "Затворная рама с газовым поршнем",
                description: "Отвести затворную раму назад до упора, приподнять и извлечь из ствольной коробки.",
                color: 0x2a2a2a,
                position: { x: 0.2, y: 1.1, z: 0 }
            },
            {
                id: 5,
                name: "Затвор",
                description: "Выдвинуть затвор вперёд и отделить от затворной рамы.",
                color: 0x1a1a1a,
                position: { x: 0.4, y: 1.1, z: 0 }
            },
            {
                id: 6,
                name: "Газовая трубка со ствольной накладкой",
                description: "Повернуть замыкатель газовой трубки до вертикального положения и снять газовую трубку с патрубка.",
                color: 0x5a3a2a,
                position: { x: 0.8, y: 1.25, z: 0.2 }
            }
        ];

        // Состояние приложения
        let mode = 'learning'; // 'learning' или 'test'
        let completedSteps = [];
        let userSequence = [];
        let currentStepIndex = 0;
        let currentHighlightedPart = 1;
        let mistakes = [];
        let startTime = Date.now();
        let timerInterval;
        let isTimerRunning = true;
        let testMode = false;

        // Three.js переменные
        let scene, camera, renderer, controls, akGroup;
        let raycaster, mouse;
        let selectedPart = null;

        // Инициализация Three.js
        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x05070a);
            
            // Туман
            scene.fog = new THREE.Fog(0x05070a, 15, 30);

            camera = new THREE.PerspectiveCamera(45, document.querySelector('.viewer').clientWidth / document.querySelector('.viewer').clientHeight, 0.1, 1000);
            camera.position.set(5, 2, 8);
            camera.lookAt(0, 1, 0);

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
            renderer.setSize(document.querySelector('.viewer').clientWidth, document.querySelector('.viewer').clientHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.setPixelRatio(window.devicePixelRatio);

            // Освещение
            // Основной свет
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);

            // Солнечный свет
            const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
            dirLight.position.set(5, 8, 5);
            dirLight.castShadow = true;
            dirLight.receiveShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            const d = 10;
            dirLight.shadow.camera.left = -d;
            dirLight.shadow.camera.right = d;
            dirLight.shadow.camera.top = d;
            dirLight.shadow.camera.bottom = -d;
            dirLight.shadow.camera.near = 2;
            dirLight.shadow.camera.far = 20;
            scene.add(dirLight);

            // Заполняющий свет
            const fillLight = new THREE.PointLight(0x446688, 0.6);
            fillLight.position.set(-3, 2, 4);
            scene.add(fillLight);

            // Подсветка снизу
            const bottomLight = new THREE.PointLight(0x334466, 0.3);
            bottomLight.position.set(0, -2, 3);
            scene.add(bottomLight);

            // Пол с текстурой
            const planeGeometry = new THREE.CircleGeometry(15, 32);
            const planeMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x1a1e2b,
                roughness: 0.7,
                metalness: 0.1,
                emissive: 0x000000
            });
            const plane = new THREE.Mesh(planeGeometry, planeMaterial);
            plane.rotation.x = -Math.PI / 2;
            plane.position.y = -0.5;
            plane.receiveShadow = true;
            scene.add(plane);

            // Декоративная сетка
            const gridHelper = new THREE.GridHelper(12, 24, 0xffd700, 0x336699);
            gridHelper.position.y = -0.49;
            scene.add(gridHelper);

            // Создаём улучшенную модель АК
            createImprovedAK();

            // Raycaster для кликов
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.0;
            controls.enableZoom = true;
            controls.maxPolarAngle = Math.PI / 2;
            controls.target.set(0, 1, 0);

            // Обработчик кликов
            renderer.domElement.addEventListener('click', onClick, false);
        }

        // Улучшенная модель АК с правильными цветами
        function createImprovedAK() {
            akGroup = new THREE.Group();

            // Цвета (реалистичные)
            const colors = {
                bluedSteel: 0x2a2a2a,      // Воронёная сталь
                polishedSteel: 0x8899aa,    // Полированная сталь
                darkSteel: 0x1a1a1a,         // Тёмная сталь
                wood: 0x8b5a2b,               // Орех
                darkWood: 0x5a3a1a,           // Тёмный орех
                bakelite: 0x4a2a1a,           // Бакелит (магазин)
                plastic: 0x222222,             // Чёрный пластик (приклад)
                textolite: 0x3a4a3a            // Текстолит (цевьё)
            };

            // СТВОЛ
            const barrelGeo = new THREE.CylinderGeometry(0.15, 0.15, 3.2, 16);
            const barrelMat = new THREE.MeshStandardMaterial({ color: colors.bluedSteel, roughness: 0.3, metalness: 0.8 });
            const barrel = new THREE.Mesh(barrelGeo, barrelMat);
            barrel.rotation.z = Math.PI / 2;
            barrel.position.set(1.6, 1, 0);
            barrel.castShadow = true;
            barrel.receiveShadow = true;
            barrel.userData = { partId: 0, name: "Ствол" };
            akGroup.add(barrel);

            // ПЛАМЕГАСИТЕЛЬ
            const muzzleGeo = new THREE.ConeGeometry(0.25, 0.4, 8);
            const muzzleMat = new THREE.MeshStandardMaterial({ color: colors.darkSteel, roughness: 0.4, metalness: 0.7 });
            const muzzle = new THREE.Mesh(muzzleGeo, muzzleMat);
            muzzle.position.set(3.2, 1, 0);
            muzzle.rotation.x = Math.PI / 2;
            muzzle.castShadow = true;
            muzzle.receiveShadow = true;
            akGroup.add(muzzle);

            // СТВОЛЬНАЯ КОРОБКА
            const receiverGeo = new THREE.BoxGeometry(1.8, 0.9, 1.2);
            const receiverMat = new THREE.MeshStandardMaterial({ color: colors.bluedSteel, roughness: 0.4, metalness: 0.7 });
            const receiver = new THREE.Mesh(receiverGeo, receiverMat);
            receiver.position.set(-0.1, 1, 0);
            receiver.castShadow = true;
            receiver.receiveShadow = true;
            receiver.userData = { partId: 0, name: "Ствольная коробка" };
            akGroup.add(receiver);

            // ПРИКЛАД (капралон)
            const stockGeo = new THREE.BoxGeometry(1.4, 0.7, 1.0);
            const stockMat = new THREE.MeshStandardMaterial({ color: colors.plastic, roughness: 0.5, metalness: 0.1 });
            const stock = new THREE.Mesh(stockGeo, stockMat);
            stock.position.set(-1.1, 1, 0);
            stock.castShadow = true;
            stock.receiveShadow = true;
            stock.userData = { partId: 0, name: "Приклад" };
            akGroup.add(stock);

            // ПИСТОЛЕТНАЯ РУКОЯТКА
            const gripGeo = new THREE.CylinderGeometry(0.3, 0.4, 0.9, 8);
            const gripMat = new THREE.MeshStandardMaterial({ color: colors.plastic, roughness: 0.6 });
            const grip = new THREE.Mesh(gripGeo, gripMat);
            grip.position.set(-0.6, 0.45, 0);
            grip.rotation.x = 0.2;
            grip.castShadow = true;
            grip.receiveShadow = true;
            grip.userData = { partId: 0, name: "Рукоятка" };
            akGroup.add(grip);

            // МАГАЗИН (partId = 1)
            const magGeo = new THREE.BoxGeometry(0.35, 1.0, 0.7);
            const magMat = new THREE.MeshStandardMaterial({ color: colors.bakelite, roughness: 0.5 });
            const mag = new THREE.Mesh(magGeo, magMat);
            mag.position.set(-0.2, 0.4, 0);
            mag.castShadow = true;
            mag.receiveShadow = true;
            mag.userData = { partId: 1, name: "Магазин" };
            akGroup.add(mag);

            // КРЫШКА СТВОЛЬНОЙ КОРОБКИ (partId = 2)
            const coverGeo = new THREE.BoxGeometry(1.6, 0.2, 0.9);
            const coverMat = new THREE.MeshStandardMaterial({ color: colors.bluedSteel, roughness: 0.3, metalness: 0.8 });
            const cover = new THREE.Mesh(coverGeo, coverMat);
            cover.position.set(-0.1, 1.35, 0);
            cover.castShadow = true;
            cover.receiveShadow = true;
            cover.userData = { partId: 2, name: "Крышка ствольной коробки" };
            akGroup.add(cover);

            // ВОЗВРАТНЫЙ МЕХАНИЗМ (partId = 3)
            const returnGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.8, 8);
            const returnMat = new THREE.MeshStandardMaterial({ color: colors.polishedSteel, roughness: 0.2, metalness: 0.9 });
            const returnMechanism = new THREE.Mesh(returnGeo, returnMat);
            returnMechanism.position.set(0.2, 1.25, 0.2);
            returnMechanism.rotation.z = Math.PI / 2;
            returnMechanism.castShadow = true;
            returnMechanism.receiveShadow = true;
            returnMechanism.userData = { partId: 3, name: "Возвратный механизм" };
            akGroup.add(returnMechanism);

            // ЗАТВОРНАЯ РАМА (partId = 4)
            const boltCarrierGeo = new THREE.BoxGeometry(1.0, 0.3, 0.5);
            const boltCarrierMat = new THREE.MeshStandardMaterial({ color: colors.darkSteel, roughness: 0.3, metalness: 0.8 });
            const boltCarrier = new THREE.Mesh(boltCarrierGeo, boltCarrierMat);
            boltCarrier.position.set(0.2, 1.1, 0);
            boltCarrier.castShadow = true;
            boltCarrier.receiveShadow = true;
            boltCarrier.userData = { partId: 4, name: "Затворная рама" };
            akGroup.add(boltCarrier);

            // ЗАТВОР (partId = 5)
            const boltGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.6, 6);
            const boltMat = new THREE.MeshStandardMaterial({ color: colors.polishedSteel, roughness: 0.2, metalness: 0.9 });
            const bolt = new THREE.Mesh(boltGeo, boltMat);
            bolt.position.set(0.5, 1.1, 0.1);
            bolt.rotation.x = Math.PI / 2;
            bolt.castShadow = true;
            bolt.receiveShadow = true;
            bolt.userData = { partId: 5, name: "Затвор" };
            akGroup.add(bolt);

            // ГАЗОВАЯ ТРУБКА (partId = 6)
            const gasTubeGeo = new THREE.CylinderGeometry(0.2, 0.2, 1.4, 8);
            const gasTubeMat = new THREE.MeshStandardMaterial({ color: colors.bluedSteel, roughness: 0.4, metalness: 0.7 });
            const gasTube = new THREE.Mesh(gasTubeGeo, gasTubeMat);
            gasTube.rotation.z = Math.PI / 2;
            gasTube.position.set(0.9, 1.25, 0.2);
            gasTube.castShadow = true;
            gasTube.receiveShadow = true;
            gasTube.userData = { partId: 6, name: "Газовая трубка" };
            akGroup.add(gasTube);

            // ЦЕВЬЁ
            const handguardGeo = new THREE.BoxGeometry(1.2, 0.3, 0.7);
            const handguardMat = new THREE.MeshStandardMaterial({ color: colors.textolite, roughness: 0.7 });
            const handguard = new THREE.Mesh(handguardGeo, handguardMat);
            handguard.position.set(0.9, 0.95, 0);
            handguard.castShadow = true;
            handguard.receiveShadow = true;
            handguard.userData = { partId: 6, name: "Цевьё" };
            akGroup.add(handguard);

            // ЦЕЛИК
            const sightGeo = new THREE.BoxGeometry(0.2, 0.25, 0.3);
            const sightMat = new THREE.MeshStandardMaterial({ color: colors.darkSteel, roughness: 0.3, metalness: 0.8 });
            const sight = new THREE.Mesh(sightGeo, sightMat);
            sight.position.set(0.6, 1.35, 0);
            sight.castShadow = true;
            sight.receiveShadow = true;
            akGroup.add(sight);

            scene.add(akGroup);
        }

        // Обработка кликов по 3D-объектам
        function onClick(event) {
            if (mode !== 'test' || testMode) return;

            // Вычисляем позицию мыши в нормализованных координатах
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // Получаем все объекты, пересечённые лучом
            const intersects = raycaster.intersectObjects(akGroup.children);

            if (intersects.length > 0) {
                const clickedObj = intersects[0].object;
                const partId = clickedObj.userData.partId;
                
                if (partId && partId > 0) {
                    handlePartClick(partId);
                }
            }
        }

        // Обработка клика по детали в тесте
        function handlePartClick(partId) {
            if (completedSteps.includes(partId)) {
                showHint(`❌ Деталь "${akParts.find(p => p.id === partId).name}" уже снята`);
                return;
            }

            const nextExpectedId = userSequence.length + 1;
            
            if (partId === nextExpectedId) {
                // Правильный выбор
                userSequence.push(partId);
                completedSteps.push(partId);
                
                // Подсветка детали (делаем полупрозрачной или убираем)
                highlightPart(partId, false);
                
                showHint(`✅ Правильно! Снята деталь: ${akParts.find(p => p.id === partId).name}`);
                
                updateProgress();
                
                if (completedSteps.length === akParts.length) {
                    completeTest('success');
                }
            } else {
                // Неправильный выбор
                mistakes.push({
                    expected: nextExpectedId,
                    got: partId,
                    time: Date.now() - startTime
                });
                
                showHint(`❌ Ошибка! Нужно снять "${akParts.find(p => p.id === nextExpectedId).name}"`);
                
                // Красная подсветка ошибки
                blinkRed(partId);
            }
        }

        // Подсветка детали
        function highlightPart(partId, active = true) {
            akGroup.children.forEach(child => {
                if (child.userData.partId === partId) {
                    if (active) {
                        child.material.emissive.setHex(0x444400);
                        child.material.emissiveIntensity = 0.5;
                    } else {
                        child.material.emissive.setHex(0x000000);
                        // Делаем деталь "снятой" - полупрозрачной
                        child.material.transparent = true;
                        child.material.opacity = 0.3;
                    }
                }
            });
        }

        // Красная подсветка ошибки
        function blinkRed(partId) {
            akGroup.children.forEach(child => {
                if (child.userData.partId === partId) {
                    const originalColor = child.material.color.getHex();
                    child.material.color.setHex(0xff0000);
                    setTimeout(() => {
                        child.material.color.setHex(originalColor);
                    }, 300);
                }
            });
        }

        // Показать подсказку
        function showHint(text) {
            document.getElementById('hintBox').textContent = text;
        }

        // Завершение теста
        function completeTest(result) {
            isTimerRunning = false;
            
            const timeElapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(timeElapsed / 60);
            const seconds = timeElapsed % 60;
            
            const modal = document.getElementById('resultModal');
            const overlay = document.getElementById('overlay');
            const title = document.getElementById('resultTitle');
            const stats = document.getElementById('resultStats');
            
            if (result === 'success') {
                title.textContent = '🏆 ТЕСТ ПРОЙДЕН!';
                stats.innerHTML = `Время: <span>${minutes}:${seconds.toString().padStart(2, '0')}</span><br>Ошибок: <span>${mistakes.length}</span>`;
            } else {
                title.textContent = '📝 РЕЗУЛЬТАТ ТЕСТА';
                stats.innerHTML = `Правильных шагов: <span>${completedSteps.length}/${akParts.length}</span><br>Ошибок: <span>${mistakes.length}</span>`;
            }
            
            modal.classList.add('show');
            overlay.classList.add('show');
        }

        // Обновление UI
        function updateUI() {
            // Обновляем прогресс
            const percent = (completedSteps.length / akParts.length) * 100;
            document.getElementById('progressPercent').textContent = `${Math.round(percent)}%`;
            document.getElementById('progressFill').style.width = `${percent}%`;

            // Обновляем список деталей
            const partsList = document.getElementById('partsList');
            partsList.innerHTML = '';
            
            akParts.forEach((part, index) => {
                const item = document.createElement('div');
                item.className = 'part-item';
                if (completedSteps.includes(part.id)) {
                    item.classList.add('completed');
                }
                if (mode === 'learning' && currentStepIndex + 1 === part.id) {
                    item.classList.add('active');
                }
                
                item.innerHTML = `
                    <div class="part-number">${index + 1}</div>
                    <div class="part-title">${part.name}</div>
                    <div class="part-status">${completedSteps.includes(part.id) ? '✅' : '⭕'}</div>
                `;
                
                item.addEventListener('click', () => {
                    if (mode === 'learning') {
                        // В обучении клик показывает информацию
                        document.getElementById('currentPartName').textContent = part.name;
                        document.getElementById('currentPartDesc').textContent = part.description;
                        currentHighlightedPart = part.id;
                        highlightPart(part.id, true);
                    }
                });
                
                partsList.appendChild(item);
            });

            // Обновляем текущую деталь в карточке
            if (mode === 'learning' && currentStepIndex < akParts.length) {
                const currentPart = akParts[currentStepIndex];
                document.getElementById('currentPartName').textContent = currentPart.name;
                document.getElementById('currentPartDesc').textContent = currentPart.description;
                highlightPart(currentPart.id, true);
            }

            // Обновляем кнопки
            const nextBtn = document.getElementById('nextBtn');
            const checkBtn = document.getElementById('checkBtn');
            const completeBtn = document.getElementById('completeBtn');
            
            if (mode === 'learning') {
                nextBtn.disabled = currentStepIndex >= akParts.length;
                checkBtn.disabled = true;
                completeBtn.disabled = completedSteps.length !== akParts.length;
            } else {
                nextBtn.disabled = true;
                checkBtn.disabled = false;
                completeBtn.disabled = completedSteps.length !== akParts.length;
            }

            // Обновляем статус-бар
            const statusIcon = document.getElementById('statusIcon');
            const statusMsg = document.getElementById('statusMessage');
            
            if (mode === 'learning') {
                statusIcon.textContent = '📖';
                statusMsg.textContent = 'Режим обучения. Следуй подсказкам';
            } else {
                statusIcon.textContent = '✍️';
                statusMsg.textContent = 'Режим теста. Кликай на детали в правильном порядке';
            }
        }

        // Обновление прогресса
        function updateProgress() {
            updateUI();
        }

        // Сброс состояния
        function reset() {
            completedSteps = [];
            userSequence = [];
            currentStepIndex = 0;
            mistakes = [];
            startTime = Date.now();
            isTimerRunning = true;
            
            // Возвращаем все детали
            akGroup.children.forEach(child => {
                child.material.emissive.setHex(0x000000);
                child.material.transparent = false;
                child.material.opacity = 1;
            });
            
            updateUI();
            showHint('🔄 Прогресс сброшен');
        }

        // Следующий шаг в обучении
        function nextStep() {
            if (currentStepIndex < akParts.length) {
                const partId = currentStepIndex + 1;
                if (!completedSteps.includes(partId)) {
                    completedSteps.push(partId);
                    userSequence.push(partId);
                    
                    // Подсветка детали как снятой
                    highlightPart(partId, false);
                    
                    showHint(`✅ Шаг ${partId}: ${akParts[currentStepIndex].instruction || 'готово'}`);
                }
                
                currentStepIndex++;
                
                if (currentStepIndex < akParts.length) {
                    highlightPart(currentStepIndex + 1, true);
                }
                
                updateUI();
                
                if (completedSteps.length === akParts.length) {
                    showHint('🎉 Молодец! Автомат полностью разобран!');
                }
            }
        }

        // Проверка последовательности в тесте
        function checkTest() {
            if (userSequence.length === 0) {
                showHint('❌ Ты ещё не снял ни одной детали!');
                return;
            }
            
            let correct = 0;
            for (let i = 0; i < userSequence.length; i++) {
                if (userSequence[i] === i + 1) {
                    correct++;
                }
            }
            
            const accuracy = Math.round((correct / userSequence.length) * 100);
            
            if (correct === userSequence.length && userSequence.length === akParts.length) {
                showHint('🎯 ИДЕАЛЬНО! 100% правильная последовательность!');
            } else {
                showHint(`📊 Точность: ${accuracy}% (${correct}/${userSequence.length} правильных)`);
            }
            
            // Подсвечиваем ошибки
            userSequence.forEach((id, index) => {
                if (id !== index + 1) {
                    blinkRed(id);
                }
            });
        }

        // Инициализация UI
        function initUI() {
            // Кнопки режимов
            document.getElementById('modeLearn').addEventListener('click', () => {
                mode = 'learning';
                testMode = false;
                document.getElementById('modeLearn').classList.add('active');
                document.getElementById('modeTest').classList.remove('active');
                reset();
            });

            document.getElementById('modeTest').addEventListener('click', () => {
                mode = 'test';
                testMode = true;
                document.getElementById('modeTest').classList.add('active');
                document.getElementById('modeLearn').classList.remove('active');
                reset();
            });

            // Кнопки действий
            document.getElementById('nextBtn').addEventListener('click', nextStep);
            document.getElementById('checkBtn').addEventListener('click', checkTest);
            document.getElementById('resetBtn').addEventListener('click', reset);
            document.getElementById('completeBtn').addEventListener('click', () => completeTest('manual'));

            // Закрытие модалки
            document.getElementById('closeResultBtn').addEventListener('click', () => {
                document.getElementById('resultModal').classList.remove('show');
                document.getElementById('overlay').classList.remove('show');
                reset();
            });

            // Таймер
            timerInterval = setInterval(() => {
                if (isTimerRunning) {
                    const elapsed = Math.floor((Date.now() - startTime) / 1000);
                    const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
                    const seconds = (elapsed % 60).toString().padStart(2, '0');
                    document.getElementById('timer').textContent = `${minutes}:${seconds}`;
                }
            }, 1000);

            // Первоначальный рендер
            updateUI();
        }

        // Анимация
        function animate() {
            requestAnimationFrame(animate);

            if (controls) {
                controls.update();
            }

            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }
        }

        // Запуск
        window.addEventListener('load', () => {
            init3D();
            initUI();
            animate();

            // Адаптация к размеру окна
            window.addEventListener('resize', () => {
                const width = document.querySelector('.viewer').clientWidth;
                const height = document.querySelector('.viewer').clientHeight;
                
                renderer.setSize(width, height);
                camera.aspect = width / height;
                camera.updateProjectionMatrix();
            });
        });
    </script>
</body>
</html>
